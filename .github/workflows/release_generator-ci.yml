name: Publish Nightly Release
on:
  workflow_dispatch:

concurrency:
  group: environment-lin-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # required to create/update releases

jobs:
  build:
    name: Build - ${{ matrix.config.os }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-22.04
            name: "Ubuntu GCC-11"
            artifact: "ubuntu_gcc.7z"
            build_type: "RelWithDebInfo"
            cc: "clang-14"
            cxx: "clang++-14"
            archiver: "7z a"
            generators: "Unix Makefiles"
            build_dir: 'build'
    steps:
      - name: Download latest nightly Release
        id: download-release
        uses: robinraju/release-downloader@v1.12
        with:
          repository: "Silverlan/pragma"
          tag: "nightly"
          fileName: "*"
          out-file-path: "downloaded"

      - name: Determine SHA of nightly Release
        shell: bash
        id: determine-sha
        run: |
          git clone --no-checkout https://github.com/Silverlan/pragma.git pragma-tmp
          cd pragma-tmp
          short_commit_sha=$(git rev-parse --short nightly)
          echo "commit_sha=$short_commit_sha" >> $GITHUB_OUTPUT
          cd ..
          rm -rf pragma-tmp

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.determine-sha.outputs.commit_sha }}"
          files: "downloaded/*"
          prerelease: true
